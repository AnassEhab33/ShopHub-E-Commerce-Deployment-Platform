apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  namespace: ecommerce
  annotations:
    # This assumes you will use the standard Nginx Ingress Controller
    kubernetes.io/ingress.class: "nginx"
    # Prevents large payloads from crashing during image uploads, etc.
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
    - http:
        paths:
          # ─── Auth & User Service ───
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3001
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3001

          # ─── Product Service ───
          - path: /api/products
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  number: 3002
          - path: /api/categories
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  number: 3002

          # ─── Cart Service ───
          - path: /api/cart
            pathType: Prefix
            backend:
              service:
                name: cart-service
                port:
                  number: 3003

          # ─── Order Service ───
          - path: /api/orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 3004

          # ─── Payment Service ───
          - path: /api/payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 3005

          # ─── Frontend (Catch-All) ───
          # This must be at the bottom so it doesn't override the /api/ paths!
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
